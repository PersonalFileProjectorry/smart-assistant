<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>봇 판별 인증 | Smart Assistant</title>

    <!-- PWA 설정 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#64b4ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" href="icon-192.png">

    <!-- 폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- MQTT 클라이언트 라이브러리 (MQTT.js over WebSocket) -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <style>
        /* CAPTCHA 전용 스타일 */
        .captcha-container {
            max-width: 520px;
            margin: 0 auto;
            padding: 40px 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .captcha-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px 32px;
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow-card);
            text-align: center;
        }

        .captcha-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .captcha-title {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .captcha-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .number-display {
            background: rgba(100, 180, 255, 0.08);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px 16px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .number-label {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 12px;
        }

        .number-value {
            font-family: var(--font-display);
            font-size: 72px;
            font-weight: 700;
            letter-spacing: 0.2em;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            user-select: none;
        }

        .number-value.waiting {
            font-size: 24px;
            color: var(--text-muted);
            background: none;
            -webkit-text-fill-color: var(--text-muted);
        }

        .timer-section {
            margin-bottom: 24px;
        }

        .timer-label {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .timer-bar {
            height: 8px;
            background: rgba(100, 180, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), var(--accent));
            transition: width 1s linear, background 0.3s ease;
            border-radius: 4px;
        }

        .timer-fill.warning {
            background: linear-gradient(90deg, var(--warning), var(--danger));
        }

        .captcha-input-wrapper {
            margin-bottom: 16px;
        }

        .captcha-input {
            width: 100%;
            padding: 18px 20px;
            font-size: 28px;
            font-family: var(--font-mono);
            font-weight: 600;
            letter-spacing: 0.3em;
            text-align: center;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            transition: all 0.2s ease;
            font-variant-numeric: tabular-nums;
        }

        .captcha-input:focus {
            border-color: var(--border-active);
            box-shadow: 0 0 0 4px rgba(100, 180, 255, 0.1);
        }

        .captcha-input.error {
            border-color: var(--danger);
            animation: shake 0.4s ease;
        }

        .captcha-input.success {
            border-color: var(--success);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .captcha-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #0a0e1a;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 15px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .captcha-submit:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px var(--accent-glow);
        }

        .captcha-submit:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .status-info {
            margin-top: 20px;
            padding: 12px 16px;
            background: rgba(100, 180, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-info .status-dot {
            width: 8px;
            height: 8px;
            background: var(--warning);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--warning);
            animation: pulse 1.5s ease-in-out infinite;
        }

        .status-info.connected .status-dot {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: none;
        }

        .status-info.error .status-dot {
            background: var(--danger);
            box-shadow: 0 0 8px var(--danger);
        }

        .feedback {
            margin-top: 16px;
            padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            display: none;
        }

        .feedback.show { display: block; animation: fadeInUp 0.3s ease; }
        .feedback.success { background: rgba(74, 222, 128, 0.1); color: var(--success); border: 1px solid rgba(74, 222, 128, 0.3); }
        .feedback.error { background: rgba(248, 113, 113, 0.1); color: var(--danger); border: 1px solid rgba(248, 113, 113, 0.3); }

        .footer-info {
            text-align: center;
            margin-top: 24px;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        @media (max-width: 480px) {
            .number-value { font-size: 56px; }
            .captcha-input { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="captcha-container">
        <div class="captcha-card">
            <div class="captcha-icon">🤖</div>
            <h1 class="captcha-title">봇 판별 인증</h1>
            <p class="captcha-subtitle">IoT 장치에서 전송된 숫자를 입력하세요</p>

            <div class="number-display">
                <div class="number-label">인증 번호</div>
                <div class="number-value waiting" id="numberValue">연결 중...</div>
            </div>

            <div class="timer-section">
                <div class="timer-label">
                    <span>남은 시간</span>
                    <span id="timerText">--초</span>
                </div>
                <div class="timer-bar">
                    <div class="timer-fill" id="timerFill" style="width: 100%"></div>
                </div>
            </div>

            <div class="captcha-input-wrapper">
                <input 
                    type="text" 
                    inputmode="numeric"
                    pattern="[0-9]*"
                    maxlength="4"
                    class="captcha-input" 
                    id="captchaInput" 
                    placeholder="- - - -"
                    autocomplete="off"
                    disabled
                >
            </div>

            <button class="captcha-submit" id="captchaSubmit" disabled>
                인증하고 입장하기
            </button>

            <div class="feedback" id="feedback"></div>

            <div class="status-info" id="statusInfo">
                <span class="status-dot"></span>
                <span id="statusText">MQTT 브로커 연결 중...</span>
            </div>
        </div>

        <div class="footer-info">
            MQTT · RP2040 · Smart Assistant
        </div>
    </div>

    <script src="captcha.js"></script>
</body>
</html>
