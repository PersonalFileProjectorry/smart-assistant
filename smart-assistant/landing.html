<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Assistant</title>

    <!-- PWA 설정 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#64b4ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SmartAssist">
    <meta name="description" content="MQTT 기반 IoT 봇 판별 스마트 어시스턴트">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" href="icon-192.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            background: #0a0e1a;
            color: #e8ecf5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            overflow: hidden;
        }
        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #64b4ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #e8ecf5, #64b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.05em;
        }
        p {
            color: #8b95a8;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(100, 180, 255, 0.1);
            border-top-color: #64b4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .footer {
            position: absolute;
            bottom: 24px;
            font-size: 11px;
            color: #5a6478;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-family: "JetBrains Mono", monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">⌘</div>
        <h1>SMART.ASSIST</h1>
        <p>잠시만 기다려주세요...</p>
        <div class="spinner"></div>
        <div class="footer">IoT · MQTT · CAPTCHA</div>
    </div>

    <script>
        // 페이지 로드 완료 후 captcha.html로 자동 이동
        // PWA Builder 검증 시: 이 페이지로 검증 통과
        // 앱 실행 시: 1초 후 captcha로 이동
        window.addEventListener('load', () => {
            setTimeout(() => {
                window.location.replace('captcha.html');
            }, 1000);
        });
    </script>
</body>
</html>
